# Local server configuration for nefarious2 (leaf server)
# This server links to the primary nefarious server (hub)

# User-facing ports
Port {
     port = 6667;
     ssl = no;
};

Port {
     port = 6697;
     ssl = yes;
};

# Server port for incoming server connections
Port {
     port = 4496;
     server = yes;
     ssl = no;
};

Port {
     port = 4497;
     server = yes;
     ssl = yes;
};

# Bouncer class — triggers bounce_auto_resume() for cross-server relay
Class {
  name = "Bouncer";
  pingfreq = 1 minutes 30 seconds;
  sendq = 160000;
  maxlinks = 100;
  bouncer = yes;
  require_sasl = yes;
};

Client {
  class = "Bouncer";
  port = 6697;
  ip = "*";
  maxlinks = 100;
};

Client {
  class = "Bouncer";
  port = 6667;
  ip = "*";
  maxlinks = 100;
};

# Connect block to primary server (hub)
Connect {
     name = "testnet.fractalrealities.net";
     host = "172.29.0.2";
     password = "serverlink123";
     port = 4497;
     class = "Server";
     hub;
     autoconnect = yes;
     ssl = yes;
};

# Connect block for X3 Services (passive - hub will forward)
Connect {
     name = "x3.services";
     host = "172.29.0.3";
     password = "abcdefg";
     port = 4496;
     class = "Server";
     autoconnect = no;
};

# Operator block
Operator {
     name = "oper";
     host = "*@*";
     password = "$PLAIN$shmoo";
     class = "Opers";
     local = no;
};

# Forward commands to X3 services
Forwards {
        "." = "x3.services";
};

Pseudo "AUTH" {
	name = "authserv";
	nick = "AuthServ@x3.services";
	prepend = "AUTH ";
};

